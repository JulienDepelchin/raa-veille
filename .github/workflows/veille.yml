name: Veille RAA Nord / Pas-de-Calais

on:
  schedule:
    # Chaque lundi à 6h00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Déclenchement manuel depuis l'interface GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  veille:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Mise en place Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Debug - environnement
        run: |
          echo "=== Répertoire de travail ==="
          ls -la
          echo "=== Contenu de data/ ==="
          ls -la data/
          echo "=== Version Python ==="
          python --version
          echo "=== Packages clés ==="
          pip list | grep -E "anthropic|pdfplumber|requests|beautifulsoup4|pypdfium2"

      - name: Scraping et téléchargement
        run: |
          echo "=== Vérification scraper.py ==="
          grep -n "input(" scraper.py || echo "Aucun input() trouvé"
          grep -n "_download" scraper.py | head -5
          echo "=== Hash du fichier ==="
          md5sum scraper.py
          echo "=== Lancement ==="
          python -c "
import sys
sys.argv = ['scraper.py', '7jours', '--download']
exec(open('scraper.py').read())
"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: "1"

      - name: Debug - PDFs téléchargés
        run: |
          echo "=== pdfs_downloaded/ ==="
          ls -la pdfs_downloaded/ 2>/dev/null || echo "(vide ou absent)"
          echo "=== data/pdfs_deja_vus.txt (5 dernières lignes) ==="
          tail -5 data/pdfs_deja_vus.txt 2>/dev/null || echo "(absent)"

      - name: Analyse Claude des nouveaux PDFs
        run: python main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit et push des résultats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "Rien a commiter." || git commit -m "chore: mise a jour resultats RAA $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
