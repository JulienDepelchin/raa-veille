name: Veille RAA Nord / Pas-de-Calais

on:
  schedule:
    # Chaque lundi à 6h00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Déclenchement manuel depuis l'interface GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  veille:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Clear cache et vérification
        run: |
          echo "=== Commit actuel ==="
          git log --oneline -1
          echo "=== Lignes 340-360 de scraper.py ==="
          sed -n '340,360p' scraper.py
          echo "=== Tous les input() restants ==="
          grep -n "input(" scraper.py || echo "AUCUN input() trouvé"

      - name: Mise en place Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Debug - environnement
        run: |
          echo "=== Répertoire de travail ==="
          ls -la
          echo "=== Contenu de data/ ==="
          ls -la data/
          echo "=== Version Python ==="
          python --version
          echo "=== Packages clés ==="
          pip list | grep -E "anthropic|pdfplumber|requests|beautifulsoup4|pypdfium2"

      - name: Scraping et téléchargement
        run: |
          python - <<'EOF'
          import sys, os
          os.chdir('/home/runner/work/raa-veille/raa-veille')
          sys.argv = ['scraper.py', '7jours', '--download']
          with open('scraper.py', 'r') as f:
              code = f.read()
          code = code.replace("input(", "raise SystemExit(  # input removed: ")
          exec(compile(code, 'scraper.py', 'exec'))
          EOF
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Debug - PDFs téléchargés
        run: |
          echo "=== pdfs_downloaded/ ==="
          ls -la pdfs_downloaded/ 2>/dev/null || echo "(vide ou absent)"
          echo "=== data/pdfs_deja_vus.txt (5 dernières lignes) ==="
          tail -5 data/pdfs_deja_vus.txt 2>/dev/null || echo "(absent)"

      - name: Analyse Claude des nouveaux PDFs
        run: python main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit et push des résultats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "Rien a commiter." || \
          git commit -m "chore: mise a jour resultats RAA $(date -u '+%Y-%m-%d')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
