name: Veille RAA Nord / Pas-de-Calais

on:
  schedule:
    # Chaque lundi à 6h00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Déclenchement manuel depuis l'interface GitHub

jobs:
  veille:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Mise en place Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Scraping et téléchargement des nouveaux PDFs (7 derniers jours)
        run: python scraper.py 7jours
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Analyse Claude des nouveaux PDFs
        run: python main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit et push des résultats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: mise a jour resultats RAA $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
